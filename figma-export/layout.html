<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4000 Figma Layout</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="header-block">
        <div class="counter-row">
          <div class="counter-digits" aria-label="weeks remaining">
            <span class="digit">3</span>
            <span class="digit">1</span>
            <span class="digit">8</span>
            <span class="digit">2</span>
          </div>
          <span class="week-fraction">2/7</span>
        </div>

        <div class="subheader-block">
          <p class="progress-label">20.5% COMPLETE</p>
          <p class="week-label">WEEK 819 - TUE, MAR 10</p>
        </div>

        <div class="stat-icons" aria-label="time stats icons">
          <button class="icon-btn muted" aria-label="eat">EAT</button>
          <button class="icon-btn active" aria-label="sleep">SLEEP</button>
          <button class="icon-btn muted" aria-label="hygiene">CLEAN</button>
        </div>
      </section>

      <section class="quote-block">
        <p class="quote-text">\"The average human lifespan is absurdly, insultingly brief.\"</p>
        <p class="quote-author">- OLIVER BURKEMAN, 4000 WEEKS</p>
      </section>

      <section class="grid-card" aria-label="4000 week grid">
        <div class="grid-container">
          <!-- Figma handoff: duplicate .dot-square to 4000 total cells in a 100-column grid -->
          <div class="dot-square dot-filled"></div>
          <div class="dot-square dot-filled"></div>
          <div class="dot-square dot-filled"></div>
          <div class="dot-square dot-current"></div>
          <div class="dot-square dot-empty"></div>
          <div class="dot-square dot-empty"></div>
          <div class="dot-square dot-empty"></div>
          <div class="dot-square dot-highlighted"></div>
          <div class="dot-square dot-stat"></div>
          <div class="dot-square dot-empty"></div>
        </div>
      </section>

      <aside class="journal-panel" aria-label="journal drawer">
        <header class="panel-header">
          <h2>Tue, Mar 10, 2026 - Mon, Mar 16, 2026</h2>
          <p>Week 819</p>
        </header>

        <div class="panel-body">
          <div class="field-group">
            <label>Journal 01</label>
            <div class="textarea-shell">What's on your mind?</div>
          </div>
          <div class="field-group">
            <label>Journal 02</label>
            <div class="textarea-shell">What's on your mind?</div>
          </div>
          <div class="field-group">
            <label>Journal 03</label>
            <div class="textarea-shell">What's on your mind?</div>
          </div>
        </div>

        <footer class="panel-footer">Changes are saved automatically</footer>
      </aside>
    </main>
  </body>
</html>
